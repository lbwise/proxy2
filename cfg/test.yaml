proxy:
  port: 9001
  load-balance: round-robin
  blacklist:
    - 127.0.1.1

dest:
  port-range:
    start: 8084
    end: 8090

client:
  port-range:
    start: 5000
    end: 6000
  flow:
    - wait-before: 0ms
      num-agents: 1
      req-path: /ping

    - wait-before: 2000ms
      num-agents: 2
      req-path: /ping

    - wait-before: 1000ms
      num-agents: 100
      req-path: /ping

logs:
  - proxy
  - client



